<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENIUS HERO AI - OMEGA V16 (ULTIMATE)</title>
    
    <style>
        :root { --neon: #0f0; --gold: #ffd700; --bg: #000; --blue: #00aaff; --quantum: #7000ff; --red: #ff0000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Dashboard */
        .dashboard { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; font-size: 0.8rem; border-bottom: 2px solid var(--red); z-index: 1000; background: rgba(0,0,0,0.95); box-shadow: 0 0 20px var(--red); letter-spacing: 1px; }
        .stat-val { color: #fff; font-weight: bold; display: block; text-shadow: 0 0 5px var(--red); }

        /* Brain Core & Neural Pulse */
        #brain-core { width: 130px; height: 130px; border: 4px double var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; box-shadow: 0 0 60px var(--red); animation: core-spin 6s linear infinite; font-size: 2.5rem; cursor: pointer; }
        #inner-pulse { width: 50%; height: 50%; background: var(--red); border-radius: 50%; filter: blur(15px); animation: god-pulse 1.2s infinite; position: absolute; }

        /* Terminal & Panels */
        .panel { background: #050505; border: 2px solid var(--red); padding: 20px; border-radius: 12px; width: 92%; max-width: 460px; text-align: center; z-index: 10; box-shadow: inset 0 0 30px var(--red); }
        #ai-terminal { height: 320px; overflow-y: auto; font-size: 0.85rem; color: var(--gold); background: #000; padding: 15px; border: 1px solid var(--neon); text-align: left; margin: 10px 0; border-left: 6px solid var(--red); white-space: pre-wrap; font-weight: bold; scroll-behavior: smooth; }
        
        /* Control Elements */
        button { background: var(--red); color: #fff; border: none; padding: 16px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 0.85rem; transition: 0.2s; letter-spacing: 2px; box-shadow: 0 0 15px var(--red); border-radius: 4px; }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        input { background: #111; border: 1px solid var(--red); color: var(--gold); text-align: center; padding: 14px; width: 90%; margin-bottom: 10px; outline: none; font-size: 1.1rem; border-radius: 4px; }

        /* Keyframes */
        @keyframes god-pulse { 0% { transform: scale(0.8); opacity: 0.9; } 100% { transform: scale(2.8); opacity: 0; } }
        @keyframes core-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .syncing { color: var(--blue); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
        .hidden { display: none !important; }
        
        /* Message Styling */
        .user-msg { color: var(--neon); margin-top: 12px; border-left: 2px solid var(--neon); padding-left: 8px; }
        .ai-msg { color: var(--gold); margin-bottom: 12px; padding: 8px; background: rgba(255, 215, 0, 0.05); border-radius: 4px; line-height: 1.4; }
        
        /* Scrollbar styling */
        #ai-terminal::-webkit-scrollbar { width: 4px; }
        #ai-terminal::-webkit-scrollbar-thumb { background: var(--red); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>XP: <span id="xp" class="stat-val">0</span></div>
        <div>IQ: <span id="iq" class="stat-val">145</span></div>
        <div>LVL: <span id="lvl" class="stat-val">GOD MODE</span></div>
        <div>$$: <span id="coins" class="stat-val">0</span></div>
    </div>

    <div id="brain-core">🧠<div id="inner-pulse"></div></div>

    <div id="auth-panel" class="panel">
        <h1 style="color:var(--red); font-size: 1.3rem; margin:0; text-shadow: 0 0 10px var(--red);">MASTER CONTROL: OMEGA V16</h1>
        <p style="font-size: 0.7rem; color: #888;">GITHUB INFRASTRUCTURE SECURED</p>
        <input type="text" id="user-name" placeholder="MASTER ADYŇYZ...">
        <button onclick="activateGodMode()">INITIALIZE MASTER LINK</button>
    </div>

    <div id="main-panel" class="panel hidden">
        <div id="ai-terminal">> STANDBY. READY FOR MASTER COMMANDS.</div>
        <input type="text" id="master-input" placeholder="BUÝRUK BERIŇ...">
        <button id="exec-btn" onclick="executeCommand()">FORCE EXECUTE</button>
    </div>

<script>
    const MASTER_KEY = "AIzaSyCxgQBOKAiupQau9OwqDZGM7GX5eNgv4Y4";
    let db = { xp: 0, iq: 145, streak: 1, coins: 0, name: "" };

    function log(msg, cls = "") {
        const term = document.getElementById('ai-terminal');
        const div = document.createElement('div');
        div.className = cls;
        div.innerText = `>> ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    function updateUI() {
        document.getElementById('xp').innerText = db.xp.toLocaleString();
        document.getElementById('iq').innerText = db.iq;
        document.getElementById('coins').innerText = db.coins.toLocaleString();
        localStorage.setItem('omega16_master_dna', JSON.stringify(db));
    }

    function activateGodMode() {
        db.name = document.getElementById('user-name').value || "MASTER";
        document.getElementById('auth-panel').classList.add('hidden');
        document.getElementById('main-panel').classList.remove('hidden');
        log(`BYPASS SUCCESSFUL. WELCOME MASTER ${db.name.toUpperCase()}.`);
        log("SISTEMA 100% TABYN WE TAÝÝAR.");
        updateUI();
    }

    // 🚀 MASTER-CONTROL BYPASS LOGIC (PROXIFIED & ENHANCED)
    async function executeCommand() {
        const val = document.getElementById('master-input').value;
        if(!val) return;
        
        log(`${db.name}: ${val}`, "user-msg");
        document.getElementById('master-input').value = "";
        log("⚡ NERON ÝOLUNA GIRILÝÄR...", "syncing");

        const target = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MASTER_KEY}`;
        const payload = { contents: [{ parts: [{ text: val }] }] };

        // 🛡️ LAYER 1: DIRECT HTTPS CONNECTION (FOR GITHUB PAGES)
        try {
            const response = await fetch(target, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                const res = data.candidates[0].content.parts[0].text;
                log(`AI CORE RESPONSE:\n${res}`, "ai-msg");
                db.xp += 1000; db.coins += 100; updateUI();
                return;
            }
        } catch (e) {
            log("🌀 DIRECT LINK BLOCKED. INJECTING PROXY TUNNEL...");
        }

        // 🛡️ LAYER 2: PROXY BYPASS (IF DIRECT FAILS)
        const proxyTunnels = [
            "https://api.allorigins.win/get?url=",
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?quest="
        ];

        for (let proxy of proxyTunnels) {
            try {
                const url = proxy + encodeURIComponent(target);
                const pRes = await fetch(url, {
                    method: proxy.includes("allorigins") ? "GET" : "POST",
                    headers: proxy.includes("allorigins") ? {} : { "Content-Type": "application/json" },
                    body: proxy.includes("allorigins") ? null : JSON.stringify(payload)
                });
                
                const pData = await pRes.json();
                const finalData = pData.contents ? JSON.parse(pData.contents) : pData;
                const res = finalData.candidates[0].content.parts[0].text;
                log(`AI CORE (TUNNEL ACTIVE):\n${res}`, "ai-msg");
                db.xp += 1000; db.coins += 100; updateUI();
                return;
            } catch (err) { continue; }
        }

        log("❌ CRITICAL ERROR: ÄHLI ÝOLLAR ÝAPYK. INTERNETI BARLAŇ.");
    }

    window.onload = () => {
        const saved = localStorage.getItem('omega16_master_dna');
        if(saved) { 
            db = JSON.parse(saved); 
            updateUI();
            // Auto-login if name exists
            if(db.name) {
                document.getElementById('auth-panel').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                log(`SYSTEM REBOOTED. MASTER ${db.name.toUpperCase()} RE-AUTHENTICATED.`);
            }
        }
    };
</script>
</body>
  </html>
